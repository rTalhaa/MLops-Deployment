name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-and-test:
    name: Validate and test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify expected project files
        run: |
          test -f app/main.py
          test -f app/__init__.py
          test -f src/train.py
          test -f src/load_test.py
          test -f models/tox21_best_model.joblib
          test -f models/model_metadata.json
          test -f Dockerfile
          test -f docker-compose.yml
          test -f monitoring/prometheus.yml
          test -f tests/test_api.py

      - name: Check Python syntax
        run: |
          python -m py_compile app/main.py
          python -m py_compile src/train.py
          python -m py_compile src/load_test.py
          python -m py_compile tests/test_api.py

      - name: Run tests
        run: python -m pytest -q

      - name: Verify model artifact compatibility
        run: |
          python - <<'PY'
          import json
          import warnings
          import joblib
          import sklearn
          from pathlib import Path
          from sklearn.exceptions import InconsistentVersionWarning

          metadata = json.loads(Path("models/model_metadata.json").read_text())
          training_version = metadata["training_library_versions"]["scikit_learn"]

          if training_version != sklearn.__version__:
              raise SystemExit(
                  f"Model trained with scikit-learn {training_version}, "
                  f"but CI runtime is {sklearn.__version__}."
              )

          with warnings.catch_warnings(record=True) as caught:
              warnings.simplefilter("always", InconsistentVersionWarning)
              joblib.load("models/tox21_best_model.joblib")

          if caught:
              raise SystemExit(
                  "Model artifact emitted an InconsistentVersionWarning during load."
              )

          print(
              "Model artifact is compatible with scikit-learn",
              sklearn.__version__,
          )
          PY

  dependency-audit:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: tox21-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
