name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-project:
    name: Validate project structure and Python syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify expected project files
        run: |
          test -f app/main.py
          test -f app/__init__.py
          test -f src/train.py
          test -f src/load_test.py
          test -f models/tox21_best_model.joblib
          test -f models/model_metadata.json
          test -f Dockerfile
          test -f docker-compose.yml
          test -f monitoring/prometheus.yml
          test -f tests/test_api.py

      - name: Check Python syntax
        run: |
          python -m py_compile app/main.py
          python -m py_compile src/train.py
          python -m py_compile src/load_test.py
          python -m py_compile tests/test_api.py
