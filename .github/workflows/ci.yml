name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    name: Test API and build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify expected project files
        run: |
          test -f app/main.py
          test -f src/train.py
          test -f models/tox21_best_model.joblib
          test -f models/model_metadata.json
          test -f Dockerfile
          test -f docker-compose.yml
          test -f monitoring/prometheus.yml

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t tox21-api:ci .

